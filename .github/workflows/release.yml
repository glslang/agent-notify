name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0, without v prefix)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  bridge-installer:
    name: Build bridge installer (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-release-bridge-${{ runner.os }}

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}".Trim()
          } else {
            $v = "${{ github.ref_name }}".TrimStart("v")
          }
          if ($v -notmatch '^\d+\.\d+\.\d+') {
            throw "Version must look like MAJOR.MINOR.PATCH, got: $v"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Inno Setup
        run: winget install --id JRSoftware.InnoSetup -e --accept-source-agreements --accept-package-agreements --silent

      - name: Build bridge binary
        run: cargo build --release -p agent-notify-bridge --locked

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after Inno Setup install"
          }
          & $iscc packaging/windows/agent-notify-bridge.iss `
            "/DAppVersion=${{ steps.version.outputs.version }}" `
            "/DReleaseDir=$PWD/target/release"

      - name: SHA256 checksum
        shell: pwsh
        run: |
          $setup = "packaging/windows/output/agent-notify-bridge-setup.exe"
          $hash = (Get-FileHash -Path $setup -Algorithm SHA256).Hash
          "$hash  agent-notify-bridge-setup.exe" | Out-File -Encoding ascii packaging/windows/output/agent-notify-bridge-setup.exe.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Agent Notify Bridge ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            packaging/windows/output/agent-notify-bridge-setup.exe
            packaging/windows/output/agent-notify-bridge-setup.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
