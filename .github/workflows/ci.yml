name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-lint-${{ runner.os }}
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-test-${{ runner.os }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --workspace --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-coverage-${{ runner.os }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov
      - name: Rust coverage
        run: cargo llvm-cov nextest --workspace --locked --lcov --output-path rust-lcov.info
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/typescript/agent-notify-cli/package-lock.json
      - name: TypeScript coverage
        working-directory: clients/typescript/agent-notify-cli
        run: |
          npm ci
          npm run test:coverage
      - name: Skip Codecov upload
        if: github.event_name == 'pull_request' && (github.actor == 'dependabot[bot]' || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "::notice::Skipping Codecov upload on this pull_request."
          echo "Dependabot PRs need CODECOV_TOKEN under Settings → Secrets and variables → Dependabot."
          echo "Fork PRs cannot access repository secrets; uploads run on push to main and same-repo PRs."
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rust-lcov.info
          flags: rust
          verbose: true
          fail_ci_if_error: true
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clients/typescript/agent-notify-cli/coverage/lcov.info
          flags: typescript
          verbose: true
          fail_ci_if_error: true

  bridge-installer-smoke:
    name: Bridge installer smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            bridge:
              - "crates/agent-notify-bridge/**"
              - "packaging/windows/**"
              - ".github/workflows/release.yml"
      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.bridge == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.bridge == 'true'
        with:
          shared-key: rust-installer-smoke-${{ runner.os }}
      - name: Install Inno Setup
        if: steps.changes.outputs.bridge == 'true'
        run: winget install --id JRSoftware.InnoSetup -e --accept-source-agreements --accept-package-agreements --silent
      - name: Build bridge and compile installer
        if: steps.changes.outputs.bridge == 'true'
        shell: pwsh
        run: |
          cargo build --release -p agent-notify-bridge --locked
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          & $iscc packaging/windows/agent-notify-bridge.iss /DAppVersion=0.0.0 /DReleaseDir=$PWD/target/release
      - uses: actions/upload-artifact@v4
        if: steps.changes.outputs.bridge == 'true'
        with:
          name: agent-notify-bridge-setup-smoke
          path: packaging/windows/output/agent-notify-bridge-setup.exe
          retention-days: 7

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript/agent-notify-cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/typescript/agent-notify-cli/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
