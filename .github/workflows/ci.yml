name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --workspace --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov
      - name: Rust coverage
        run: cargo llvm-cov nextest --workspace --locked --lcov --output-path rust-lcov.info
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/typescript/agent-notify-cli/package-lock.json
      - name: TypeScript coverage
        working-directory: clients/typescript/agent-notify-cli
        run: |
          npm ci
          npm run test:coverage
      - name: Skip Codecov upload
        if: github.event_name == 'pull_request' && (github.actor == 'dependabot[bot]' || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "::notice::Skipping Codecov upload on this pull_request."
          echo "Dependabot PRs need CODECOV_TOKEN under Settings → Secrets and variables → Dependabot."
          echo "Fork PRs cannot access repository secrets; uploads run on push to main and same-repo PRs."
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rust-lcov.info
          flags: rust
          verbose: true
          fail_ci_if_error: true
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clients/typescript/agent-notify-cli/coverage/lcov.info
          flags: typescript
          verbose: true
          fail_ci_if_error: true

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript/agent-notify-cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/typescript/agent-notify-cli/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
