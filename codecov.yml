codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        target: auto

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flag_management:
  individual_flags:
    - name: rust
      carryforward: true
    - name: typescript
      carryforward: true

ignore:
  - "target/**"
  - "clients/typescript/agent-notify-cli/dist/**"
  - "clients/typescript/agent-notify-cli/node_modules/**"
  - "clients/typescript/agent-notify-cli/coverage/**"
